version: 2.9

builds:
  - binary: loom
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

release:
  prerelease: auto

checksum:
  name_template: 'checksums.txt'

# Release notes are generated by git-cliff and passed via --release-notes in the workflow.
changelog:
  disable: true
